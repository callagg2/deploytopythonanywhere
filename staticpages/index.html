<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="app.js" defer></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Book Manager</span>
        </div>
    </nav>

    <div class="container">

        <!-- Form Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h4 class="mb-0">Add / Update Book</h4>
            </div>

            <div class="card-body">
                <form id="bookForm" class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label">Book ID (leave empty to create)</label>
                        <input type="text" id="bookId" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Author</label>
                        <input type="text" id="author" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Year</label>
                        <input type="number" id="year" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary w-100" type="submit">Save / Update Book</button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">Books</h4>
            </div>

            <div class="card-body">
                <table class="table table-striped" id="booksTable">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Year</th>
                            <th style="width: 150px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
